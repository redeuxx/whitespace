<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — {{ site_name }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}" />
</head>
<body>
<section class="section">
  <div class="columns is-centered">
    <div class="column is-4">

      <div class="has-text-centered mb-5">
        <a href="{{ url_for('main.index') }}" style="text-decoration: none;">
          <h1 style="font-size: 2rem; font-weight: 700; color: var(--ws-accent);">{{ site_name }}</h1>
        </a>
        <p style="color: var(--ws-muted);">admin Panel</p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="notification is-{{ category }} mb-3">
            <button class="delete"></button>
            {{ message }}
          </div>
        {% endfor %}
      {% endwith %}

      <div class="box">
        <form method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

          <div class="field">
            <label class="label" for="username">Username</label>
            <div class="control has-icons-left">
              <input class="input" type="text" id="username" name="username"
                     placeholder="admin username" autofocus required />
              <span class="icon is-left"><i class="fas fa-user"></i></span>
            </div>
          </div>

          <div class="field">
            <label class="label" for="password">Password</label>
            <div class="control has-icons-left has-icons-right">
              <input class="input" type="password" id="password" name="password"
                     placeholder="admin password" required />
              <span class="icon is-left"><i class="fas fa-lock"></i></span>
              <span class="icon is-right toggle-password" data-target="password"
                    style="pointer-events: all; cursor: pointer;">
                <i class="fas fa-eye"></i>
              </span>
            </div>
          </div>

          <div class="field mt-4">
            <div class="control">
              <button type="submit" class="button is-primary is-fullwidth">
                <span class="icon"><i class="fas fa-sign-in-alt"></i></span>
                <span>Login</span>
              </button>
            </div>
          </div>
        </form>
      </div>

      <div class="has-text-centered mt-3">
        <a href="{{ url_for('main.index') }}" style="color: var(--ws-muted); font-size: 0.875rem;">
          &larr; Back to {{ site_name }}
        </a>
      </div>

    </div>
  </div>
</section>
<script src="{{ url_for('static', filename='js/main.js') }}" data-cfasync="false"></script>
</body>
</html>
