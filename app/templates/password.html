{% extends "base.html" %}

{% block title %}Protected Paste — {{ site_name }}{% endblock %}

{% block content %}
<div class="columns is-centered">
  <div class="column is-5">
    <div class="box">
      <div class="has-text-centered mb-4">
        <span class="icon is-large" style="color: var(--ws-green);">
          <i class="fas fa-lock fa-2x"></i>
        </span>
        <h1 class="title is-5 mt-3">Password Protected</h1>
        <p class="subtitle is-6" style="color: var(--ws-muted);">
          This paste requires a password to view.
        </p>
      </div>

      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <div class="field">
          <label class="label" for="password">Password</label>
          <div class="control has-icons-left has-icons-right">
            <input class="input" type="password" id="password" name="password"
                   placeholder="Enter password" autofocus required />
            <span class="icon is-left"><i class="fas fa-key"></i></span>
            <span class="icon is-right toggle-password" data-target="password"
                  style="pointer-events: all; cursor: pointer;">
              <i class="fas fa-eye"></i>
            </span>
          </div>
        </div>
        <div class="field mt-4">
          <div class="control">
            <button type="submit" class="button is-primary is-fullwidth">
              <span class="icon"><i class="fas fa-unlock"></i></span>
              <span>Unlock Paste</span>
            </button>
          </div>
        </div>
      </form>

      <div class="mt-4 has-text-centered">
        <a href="{{ url_for('main.index') }}" style="color: var(--ws-muted); font-size: 0.875rem;">
          &larr; Back to pastes
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
